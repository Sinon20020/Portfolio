<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Development</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f9f8f5;
    color: #1a1916;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1d9e75;
    margin: 0 auto 2.5rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  h1 em {
    font-style: italic;
    color: #6b6a65;
  }

  p {
    color: #6b6a65;
    font-weight: 300;
    font-size: 1rem;
    max-width: 340px;
    line-height: 1.75;
  }

  .line {
    width: 40px;
    height: 1px;
    background: #dddbd3;
    margin: 2rem auto;
  }

  .back {
    font-size: 0.8rem;
    color: #6b6a65;
    text-decoration: none;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #dddbd3;
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .back:hover { color: #1a1916; border-color: #1a1916; }
</style>
</head>
<body>
  <div class="dot"></div>
  <h1>Still under<br><em>development.</em></h1>
  <div class="line"></div>
  <p>This page is being built. Check back soon — something great is on the way.</p>
</body>
</html>
